<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0a1a" />
    <meta name="description" content="Life Architect - Plan, Execute, and Reflect on your days with this comprehensive productivity app" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Life Architect" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Life Architect</title>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Life Architect.</noscript>
    <div id="root"></div>
    <script>
      // Global Error Logger for Mobile Debugging
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        var errorContainer = document.getElementById('global-error-logger');
        if (!errorContainer) {
          errorContainer = document.createElement('div');
          errorContainer.id = 'global-error-logger';
          errorContainer.style.position = 'fixed';
          errorContainer.style.top = '0';
          errorContainer.style.left = '0';
          errorContainer.style.width = '100%';
          errorContainer.style.height = '100%'; // Full screen to overlap white screen
          errorContainer.style.zIndex = '999999';
          errorContainer.style.backgroundColor = 'rgba(0,0,0,0.9)';
          errorContainer.style.color = '#ff6b6b';
          errorContainer.style.padding = '20px';
          errorContainer.style.fontFamily = 'monospace';
          errorContainer.style.fontSize = '14px';
          errorContainer.style.overflow = 'auto';
          errorContainer.style.whiteSpace = 'pre-wrap';
          errorContainer.innerHTML = '<h2 style="color:white;border-bottom:1px solid #333;padding-bottom:10px;">Application Error Application Error</h2>';
          document.body.appendChild(errorContainer);
        }
        var errorMessage = 'Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nStack: ' + (error ? error.stack : 'N/A');
        errorContainer.innerHTML += '<div>' + errorMessage + '</div><hr style="border-color:#333"/>';
        return false;
      };

      window.addEventListener('unhandledrejection', function (event) {
        window.onerror('Unhandled Promise Rejection: ' + event.reason, 'N/A', 0, 0, event.reason);
      });
    </script>
  </body>
</html>
